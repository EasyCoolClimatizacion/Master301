<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Master 301">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e3a8a">
    
    <title>Master Driver 301 - Auditoría Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #f1f5f9;
            color: #1e293b;
        }

        .app-container {
            padding-top: calc(0.5rem + var(--safe-top));
            padding-bottom: calc(4rem + var(--safe-bottom));
        }

        .card { 
            border-radius: 1.5rem; 
            background: white; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .input-pro {
            width: 100%;
            padding: 1rem;
            background-color: #f8fafc;
            border-radius: 1rem;
            font-weight: 700;
            font-size: 1.1rem;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .input-pro:focus {
            background-color: #ffffff;
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-big {
            width: 100%;
            padding: 1.25rem;
            border-radius: 1.25rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn-big:active { transform: scale(0.96); }

        .modal-base {
            position: fixed;
            inset: 0;
            background-color: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: none;
            align-items: end;
            justify-content: center;
        }

        .modal-base.active { display: flex; }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 2rem 2rem 0 0;
            padding: 2rem;
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .bar-container { height: 100px; display: flex; align-items: flex-end; justify-content: space-between; gap: 4px; }
        .bar { width: 100%; border-radius: 6px 6px 2px 2px; transition: height 0.6s; position: relative; min-height: 2px; }
        .bar-label { font-size: 10px; font-weight: 800; color: #94a3b8; text-align: center; margin-top: 8px; }

        .tooltip {
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            background: #000; color: #fff; font-size: 8px; padding: 2px 4px;
            border-radius: 4px; display: none; pointer-events: none;
            white-space: nowrap; z-index: 50;
        }
        .bar:hover .tooltip { display: block; }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-blue-900 text-white sticky top-0 z-50 shadow-xl pt-[env(safe-area-inset-top)]">
        <div class="max-w-md mx-auto p-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white p-2.5 rounded-2xl text-blue-900 shadow-lg">
                    <i data-lucide="gauge" class="w-7 h-7"></i>
                </div>
                <h1 class="text-xl font-black tracking-tighter uppercase italic">Master Driver 301</h1>
            </div>
            <div class="bg-blue-800 px-4 py-2 rounded-2xl border border-blue-700 font-black text-sm">
                <span id="display-date"></span>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6 app-container">

        <!-- DASHBOARD PRINCIPAL -->
        <section class="card p-6 bg-slate-900 text-white border-b-8 border-blue-600 text-slate-800">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <p class="text-xs font-bold uppercase tracking-widest text-blue-400 mb-1">Neto Real (Bolsillo)</p>
                    <h2 id="total-net-display" class="text-5xl font-black tracking-tighter leading-none text-white">$0</h2>
                    <div class="mt-3 flex items-center gap-2">
                        <span class="text-[10px] font-bold bg-white/10 px-2 py-1 rounded-lg text-white">Bruto Total: <span id="total-bruto-header">$0</span></span>
                    </div>
                </div>
                <div class="text-right">
                    <div class="flex flex-col items-end">
                        <span class="text-blue-400 font-black text-lg" id="total-km-display">0 KM</span>
                        <span class="text-emerald-400 font-black text-sm" id="total-hours-display">0.0 HRS</span>
                    </div>
                </div>
            </div>

            <div id="chart-bars" class="bar-container mb-2"></div>
            <div id="chart-labels" class="flex justify-between mb-6"></div>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white/5 rounded-2xl p-4 border border-white/10 text-center text-white">
                    <p class="text-[8px] font-bold uppercase opacity-50 mb-1">Uber Bruto</p>
                    <p id="uber-bruto-display" class="font-black text-xl">$0</p>
                </div>
                <div class="bg-white/5 rounded-2xl p-4 border border-white/10 text-center text-[#7343e2]">
                    <p class="text-[8px] font-bold uppercase opacity-50 mb-1 text-white">Cabify Bruto</p>
                    <p id="cabify-bruto-display" class="font-black text-xl text-white">$0</p>
                </div>
            </div>
        </section>

        <!-- FORMULARIO DE REGISTRO -->
        <section class="card p-6 space-y-8 text-slate-800">
            <div class="flex items-center justify-between">
                <h3 class="text-lg font-black uppercase flex items-center gap-2">
                    <i data-lucide="play-circle" class="text-emerald-500 w-6 h-6"></i> Cierre de Turno
                </h3>
                <div class="text-right">
                    <label class="text-[9px] font-black text-slate-400 uppercase block mb-1">Fecha</label>
                    <input type="date" id="input-date" class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-lg border-none focus:ring-0">
                </div>
            </div>
            
            <div class="bg-slate-50 p-4 rounded-2xl space-y-4 border border-slate-100 shadow-inner">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1 italic">Hora Inicio</label>
                        <input type="time" id="input-time-start" class="input-pro shadow-sm text-blue-900">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1 italic">KM Inicial</label>
                        <input type="number" id="input-km-start" placeholder="0" class="input-pro shadow-sm">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 text-slate-800">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1 italic text-slate-300">Hora Fin</label>
                        <input type="time" id="input-time-end" class="input-pro shadow-sm text-slate-400" readonly placeholder="Auto">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-1 italic">KM Final</label>
                        <input type="number" id="input-km-end" placeholder="0" class="input-pro shadow-sm">
                    </div>
                </div>
            </div>

            <div class="space-y-6 text-slate-800">
                <div class="p-5 rounded-3xl border-2 border-slate-100 space-y-4 shadow-sm">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-3 h-3 bg-black rounded-full"></div>
                        <p class="text-xs font-black uppercase tracking-widest">Ingresos Uber</p>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="uber-bruto" placeholder="Bruto $" class="input-pro">
                        <input type="number" id="uber-cash" placeholder="Efectivo $" class="input-pro text-orange-600">
                    </div>
                </div>

                <div class="p-5 rounded-3xl border-2 border-[#7343e2]/20 space-y-4 shadow-sm text-slate-800">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-3 h-3 bg-[#7343e2] rounded-full"></div>
                        <p class="text-xs font-black uppercase tracking-widest text-[#7343e2]">Ingresos Cabify</p>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="cabify-bruto" placeholder="Bruto $" class="input-pro">
                        <input type="number" id="cabify-cash" placeholder="Efectivo $" class="input-pro text-orange-600">
                    </div>
                </div>
            </div>

            <!-- CALCULADORA DUAL (PETROLEO + TAG) -->
            <div class="space-y-6 bg-slate-50 p-6 rounded-3xl text-slate-800">
                <div class="space-y-4">
                    <label class="text-xs font-black uppercase text-slate-400 italic">Petróleo Acumulado: $<span id="fuel-sum-label" class="text-orange-600">0</span></label>
                    <div class="flex gap-2">
                        <input type="number" id="input-fuel-adder" placeholder="Monto carga $" class="input-pro w-full">
                        <button onclick="addFuelValue()" class="bg-orange-500 text-white p-4 rounded-2xl shadow-lg active:scale-90 transition-transform">
                            <i data-lucide="plus"></i>
                        </button>
                    </div>
                    <div id="fuel-pills" class="flex flex-wrap gap-2"></div>
                </div>
                
                <div class="space-y-4 border-t border-slate-200 pt-4">
                    <label class="text-xs font-black uppercase text-slate-400 italic">TAG Acumulado: $<span id="tag-sum-label" class="text-blue-600">0</span></label>
                    <div class="flex gap-2">
                        <input type="number" id="input-tag-adder" placeholder="Monto pórtico $" class="input-pro w-full">
                        <button onclick="addTagValue()" class="bg-blue-600 text-white p-4 rounded-2xl shadow-lg active:scale-90 transition-transform">
                            <i data-lucide="plus"></i>
                        </button>
                    </div>
                    <div id="tag-pills" class="flex flex-wrap gap-2"></div>
                </div>
            </div>

            <button id="btn-save" class="btn-big bg-blue-900 text-white shadow-2xl shadow-blue-900/40">
                <i data-lucide="check-circle-2"></i> Finalizar y Guardar Turno
            </button>
        </section>

        <!-- HISTORIAL -->
        <section class="space-y-4 pb-12">
            <div class="flex justify-between items-center px-2">
                <h3 class="text-sm font-black uppercase tracking-widest text-slate-400 italic">Auditoría del Mes</h3>
                <button onclick="openConfirmReset()" class="text-xs font-bold text-red-500 uppercase border border-red-100 px-3 py-1 rounded-lg">Reset</button>
            </div>
            <div id="history-container" class="space-y-4"></div>
        </section>

    </main>

    <!-- VENTANA DETALLE -->
    <div id="detail-modal" class="modal-base" onclick="closeModal('detail-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-8"></div>
            <div id="detail-content" class="space-y-6"></div>
            <button onclick="closeModal('detail-modal')" class="btn-big bg-slate-900 text-white mt-10">Cerrar Recibo</button>
        </div>
    </div>

    <!-- CONFIRMACIÓN RESET -->
    <div id="reset-confirm-modal" class="modal-base items-center p-6 text-slate-800">
        <div class="bg-white w-full max-w-xs rounded-3xl p-8 text-center space-y-6">
            <div class="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto">
                <i data-lucide="alert-triangle" size="40"></i>
            </div>
            <h4 class="text-2xl font-black uppercase">¿Borrar todo?</h4>
            <div class="grid grid-cols-2 gap-4 pt-2">
                <button onclick="closeModal('reset-confirm-modal')" class="bg-slate-100 text-slate-600 p-4 rounded-2xl font-black">NO</button>
                <button onclick="clearAll()" class="bg-red-600 text-white p-4 rounded-2xl font-black shadow-lg text-white">SÍ</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'master_301_audit_vfinal_v4';
        let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let currentTagList = [];
        let currentFuelList = [];

        function safeRenderIcons() {
            if (window.lucide) window.lucide.createIcons();
            else setTimeout(safeRenderIcons, 200);
        }

        function getNowTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }

        function getTodayISO() {
            return new Date().toISOString().split('T')[0];
        }

        // --- CALCULADORA PETRÓLEO ---
        function addFuelValue() {
            const input = document.getElementById('input-fuel-adder');
            const val = parseFloat(input.value);
            if (!isNaN(val) && val > 0) {
                currentFuelList.push(val);
                input.value = "";
                renderFuelPills();
            }
        }

        function renderFuelPills() {
            const container = document.getElementById('fuel-pills');
            const label = document.getElementById('fuel-sum-label');
            const total = currentFuelList.reduce((a, b) => a + b, 0);
            label.innerText = total.toLocaleString('es-CL');
            container.innerHTML = currentFuelList.map((t, i) => `
                <div onclick="removeFuel(${i})" class="bg-orange-100 text-orange-700 px-4 py-2 rounded-2xl font-bold text-xs flex items-center gap-2 shadow-sm">
                    $${t.toLocaleString('es-CL')} <i data-lucide="x" class="w-3 h-3 text-orange-400"></i>
                </div>
            `).join('');
            safeRenderIcons();
        }

        function removeFuel(index) {
            currentFuelList.splice(index, 1);
            renderFuelPills();
        }

        // --- CALCULADORA TAG ---
        function addTagValue() {
            const input = document.getElementById('input-tag-adder');
            const val = parseFloat(input.value);
            if (!isNaN(val) && val > 0) {
                currentTagList.push(val);
                input.value = "";
                renderTagPills();
            }
        }

        function renderTagPills() {
            const container = document.getElementById('tag-pills');
            const label = document.getElementById('tag-sum-label');
            const total = currentTagList.reduce((a, b) => a + b, 0);
            label.innerText = total.toLocaleString('es-CL');
            container.innerHTML = currentTagList.map((t, i) => `
                <div onclick="removeTag(${i})" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-2xl font-bold text-xs flex items-center gap-2 shadow-sm">
                    $${t.toLocaleString('es-CL')} <i data-lucide="x" class="w-3 h-3 text-blue-400"></i>
                </div>
            `).join('');
            safeRenderIcons();
        }

        function removeTag(index) {
            currentTagList.splice(index, 1);
            renderTagPills();
        }

        function updateChart() {
            const container = document.getElementById('chart-bars');
            const labelContainer = document.getElementById('chart-labels');
            if (!container) return;

            const days = ['D', 'L', 'M', 'X', 'J', 'V', 'S'];
            const today = new Date();
            let dailyTotals = {};

            db.forEach(log => {
                if (!dailyTotals[log.fullDate]) dailyTotals[log.fullDate] = 0;
                dailyTotals[log.fullDate] += (log.bruto || 0);
            });

            let chartHtml = "";
            let labelsHtml = "";
            for (let i = 6; i >= 0; i--) {
                const d = new Date(); d.setDate(today.getDate() - i);
                const dateKey = d.toLocaleDateString('es-CL', { day: '2-digit', month: '2-digit' });
                const val = dailyTotals[dateKey] || 0;
                const height = Math.min((val / 150000) * 100, 100); 
                chartHtml += `<div class="bar ${val > 0 ? 'bg-blue-500' : 'bg-white/10'}" style="height: ${Math.max(height, 5)}%"><div class="tooltip">$${Math.round(val).toLocaleString('es-CL')}</div></div>`;
                labelsHtml += `<div class="bar-label" style="width:100%">${days[d.getDay()]}</div>`;
            }
            container.innerHTML = chartHtml;
            labelContainer.innerHTML = labelsHtml;
        }

        function processEntry() {
            const timeEnd = getNowTime();
            const dateInput = document.getElementById('input-date').value;
            const startTimeValue = document.getElementById('input-time-start').value;
            const startKm = parseFloat(document.getElementById('input-km-start').value);
            const endKm = parseFloat(document.getElementById('input-km-end').value);
            const uBruto = parseFloat(document.getElementById('uber-bruto').value) || 0;
            const uCash = parseFloat(document.getElementById('uber-cash').value) || 0;
            const cBruto = parseFloat(document.getElementById('cabify-bruto').value) || 0;
            const cCash = parseFloat(document.getElementById('cabify-cash').value) || 0;
            
            const fuelTotal = currentFuelList.reduce((a, b) => a + b, 0);
            const tagTotal = currentTagList.reduce((a, b) => a + b, 0);

            if (isNaN(startKm) || isNaN(endKm) || (uBruto + cBruto) === 0 || !dateInput || !startTimeValue) return;
            const kmTotal = endKm - startKm;
            if (kmTotal <= 0) return;

            const [h1, m1] = startTimeValue.split(':').map(Number);
            const [h2, m2] = timeEnd.split(':').map(Number);
            let diffMin = (h2 * 60 + m2) - (h1 * 60 + m1);
            if (diffMin < 0) diffMin += 1440; 
            const hours = diffMin / 60;

            const uNet = Math.round(uBruto * 0.8475);
            const cNet = Math.round(cBruto * 0.8475);
            const tax = Math.round((uBruto + cBruto) * 0.1525);
            const netFinal = (uNet + cNet) - fuelTotal - tagTotal;

            const selectedDate = new Date(dateInput + 'T12:00:00');
            const entry = {
                id: Date.now(),
                fullDate: selectedDate.toLocaleDateString('es-CL', { day: '2-digit', month: '2-digit' }),
                dateStr: new Intl.DateTimeFormat('es-CL', { day: 'numeric', month: 'short' }).format(selectedDate),
                time: `${startTimeValue} - ${timeEnd}`,
                hours: hours,
                kmTotal: kmTotal,
                uBruto, uCash, uNet,
                cBruto, cCash, cNet,
                fuel: fuelTotal, tag: tagTotal, tax,
                bruto: uBruto + cBruto,
                net: netFinal,
                bank: (uNet + cNet) - (uCash + cCash)
            };

            db.unshift(entry);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));

            // Reset UI
            document.getElementById('input-km-start').value = endKm;
            document.getElementById('input-date').value = getTodayISO();
            document.getElementById('input-time-start').value = getNowTime();
            currentFuelList = [];
            currentTagList = [];
            renderFuelPills();
            renderTagPills();
            ['input-km-end', 'uber-bruto', 'uber-cash', 'cabify-bruto', 'cabify-cash', 'input-fuel-adder', 'input-tag-adder'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.value = "";
            });

            refreshUI();
            showDetail(entry.id);
        }

        function refreshUI() {
            const elements = {
                net: document.getElementById('total-net-display'),
                brutoH: document.getElementById('total-bruto-header'),
                uBruto: document.getElementById('uber-bruto-display'),
                cBruto: document.getElementById('cabify-bruto-display'),
                km: document.getElementById('total-km-display'),
                hrs: document.getElementById('total-hours-display')
            };

            if (db.length === 0) {
                Object.values(elements).forEach(el => el.innerText = el.id.includes('km') ? '0 KM' : el.id.includes('hours') ? '0.0 HRS' : '$0');
                renderHistory(); updateChart(); return;
            }

            const totals = db.reduce((acc, log) => {
                acc.net += log.net;
                acc.bruto += (log.uBruto + log.cBruto);
                acc.uB += log.uBruto;
                acc.cB += log.cBruto;
                acc.km += log.kmTotal;
                acc.hrs += (parseFloat(log.hours) || 0);
                return acc;
            }, { net: 0, bruto: 0, uB: 0, cB: 0, km: 0, hrs: 0 });

            elements.net.innerText = `$${Math.round(totals.net).toLocaleString('es-CL')}`;
            elements.brutoH.innerText = `$${Math.round(totals.bruto).toLocaleString('es-CL')}`;
            elements.uBruto.innerText = `$${Math.round(totals.uB).toLocaleString('es-CL')}`;
            elements.cBruto.innerText = `$${Math.round(totals.cB).toLocaleString('es-CL')}`;
            elements.km.innerText = `${totals.km.toLocaleString('es-CL')} KM`;
            elements.hrs.innerText = `${totals.hrs.toFixed(1)} HRS`;
            
            updateChart();
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            container.innerHTML = db.map(log => `
                <div class="card p-5 border-l-[10px] ${log.uBruto > log.cBruto ? 'border-black' : 'border-[#7343e2]'} flex justify-between items-center shadow-md text-slate-800" onclick="showDetail(${log.id})">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="bg-blue-50 text-blue-700 text-[9px] font-black px-2 py-0.5 rounded uppercase">${log.dateStr}</span>
                            <span class="text-[9px] font-bold text-slate-400">${log.time}</span>
                        </div>
                        <p class="text-2xl font-black tracking-tight text-green-600 leading-none">$${Math.round(log.net).toLocaleString('es-CL')}</p>
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">${log.kmTotal} KM TRABAJADOS</p>
                    </div>
                    <div class="text-blue-600 bg-blue-50 p-4 rounded-2xl">
                        <i data-lucide="receipt-text"></i>
                    </div>
                </div>
            `).join('');
            safeRenderIcons();
        }

        function showDetail(id) {
            const log = db.find(x => x.id === id);
            const content = document.getElementById('detail-content');
            
            content.innerHTML = `
                <div class="text-center space-y-1">
                    <h4 class="text-3xl font-black italic uppercase tracking-tighter text-blue-900 leading-none">Resumen de Turno</h4>
                    <p class="text-slate-400 font-black text-xs uppercase tracking-widest">${log.dateStr} | ${log.time}</p>
                </div>
                
                <div class="space-y-4 bg-slate-50 p-6 rounded-3xl border border-slate-100 text-slate-700">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white p-3 rounded-2xl shadow-sm">
                            <p class="text-[8px] font-black uppercase text-slate-400 mb-1 leading-none text-slate-400">Distancia</p>
                            <p class="font-black text-sm">${log.kmTotal} KM</p>
                        </div>
                        <div class="bg-white p-3 rounded-2xl shadow-sm">
                            <p class="text-[8px] font-black uppercase text-slate-400 mb-1 leading-none text-slate-400">Tiempo</p>
                            <p class="font-black text-sm">${log.hours.toFixed(1)} HRS</p>
                        </div>
                    </div>

                    <div class="space-y-2 pt-2 border-t border-slate-200">
                        <div class="flex justify-between text-xs font-bold"><span>Bruto Uber:</span> <span class="text-black text-slate-800">$${log.uBruto.toLocaleString('es-CL')}</span></div>
                        <div class="flex justify-between text-xs font-bold text-[#7343e2]"><span>Bruto Cabify:</span> <span class="text-[#7343e2]">$${log.cBruto.toLocaleString('es-CL')}</span></div>
                        <div class="flex justify-between text-xs font-bold text-red-500"><span>Impuesto SII (15.25%):</span> <span class="text-red-600">-$${log.tax.toLocaleString('es-CL')}</span></div>
                        <div class="flex justify-between text-xs font-bold text-orange-600"><span>Petróleo Total:</span> <span class="text-orange-600">-$${log.fuel.toLocaleString('es-CL')}</span></div>
                        <div class="flex justify-between text-xs font-bold text-blue-500"><span>TAG Total:</span> <span class="text-blue-600">-$${log.tag.toLocaleString('es-CL')}</span></div>
                    </div>

                    <div class="border-t-2 border-dashed border-slate-300 my-4"></div>
                    
                    <div class="flex justify-between items-center">
                        <p class="text-[10px] font-black uppercase text-slate-400">Neto al Bolsillo:</p>
                        <p class="text-3xl font-black text-green-600">$${Math.round(log.net).toLocaleString('es-CL')}</p>
                    </div>
                </div>

                <div class="bg-blue-900 text-white p-6 rounded-[2rem] shadow-xl relative overflow-hidden">
                    <p class="text-[10px] font-black uppercase opacity-60 mb-2 italic">Cierre con el Banco</p>
                    <div class="flex justify-between text-xs mb-3 font-bold">
                        <span>Efectivo que ya tienes:</span>
                        <span class="text-orange-400">$${log.cash.toLocaleString('es-CL')}</span>
                    </div>
                    <div class="border-t border-white/20 pt-4 flex justify-between items-center">
                        <span class="text-sm font-black">Depósito esperado:</span>
                        <span class="text-2xl font-black text-blue-200">$${Math.round(log.bank).toLocaleString('es-CL')}</span>
                    </div>
                </div>
            `;
            document.getElementById('detail-modal').classList.add('active');
            safeRenderIcons();
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function openConfirmReset() { document.getElementById('reset-confirm-modal').classList.add('active'); safeRenderIcons(); }
        function clearAll() { db = []; localStorage.removeItem(STORAGE_KEY); closeModal('reset-confirm-modal'); refreshUI(); }

        function initApp() {
            document.getElementById('display-date').innerText = new Intl.DateTimeFormat('es-CL', { day: 'numeric', month: 'short' }).format(new Date());
            document.getElementById('input-date').value = getTodayISO();
            document.getElementById('input-time-start').value = getNowTime();
            document.getElementById('btn-save').addEventListener('click', processEntry);
            refreshUI(); safeRenderIcons();
        }

        window.onload = initApp;
    </script>
</body>
</html>
