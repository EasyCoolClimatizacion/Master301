<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Configuración para Aplicación Nativa (PWA) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Master 301">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e3a8a">
    
    <title>Master Driver 301 - Auditoría Pro</title>
    
    <!-- Librerías de Estilo e Iconos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            background-color: #f8fafc;
        }

        /* Ajuste para que se vea como app a pantalla completa */
        .app-container {
            padding-top: calc(1rem + var(--safe-top));
            padding-bottom: calc(2rem + var(--safe-bottom));
        }

        .card { 
            border-radius: 1.25rem; 
            background: white; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0,0,0,0.05);
        }

        input { font-size: 16px !important; border: none !important; outline: none !important; }
        
        .btn-primary {
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            box-shadow: 0 4px 14px 0 rgba(30, 64, 175, 0.3);
        }

        #result-modal.active { display: flex !important; animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .input-readonly {
            background-color: #f1f5f9 !important;
            color: #94a3b8 !important;
            border: 1px dashed #e2e8f0 !important;
        }

        /* Gráfico de Barras */
        .bar-container { height: 100px; display: flex; align-items: flex-end; justify-content: space-between; gap: 6px; }
        .bar { width: 100%; border-radius: 4px 4px 2px 2px; transition: height 0.6s ease-in-out; position: relative; min-height: 4px; }
        .bar-label { font-size: 8px; font-weight: 800; color: #64748b; text-align: center; margin-top: 8px; text-transform: uppercase; }
        
        .tooltip {
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            background: #000; color: #fff; font-size: 8px; padding: 2px 4px;
            border-radius: 4px; display: none; pointer-events: none;
            white-space: nowrap; z-index: 50;
        }
        .bar:hover .tooltip { display: block; }
    </style>
</head>
<body class="min-h-screen text-slate-900">

    <!-- Header Principal -->
    <header class="bg-blue-900 text-white sticky top-0 z-50 shadow-lg pt-[env(safe-area-inset-top)]">
        <div class="max-w-md mx-auto p-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white p-2 rounded-xl text-blue-900 shadow-inner">
                    <i data-lucide="layers" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black tracking-tight leading-none uppercase">Master Driver 301</h1>
                </div>
            </div>
            <div class="bg-blue-800/50 px-3 py-1.5 rounded-full border border-blue-700">
                <span id="display-date" class="text-xs font-bold"></span>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4 app-container">

        <!-- Dashboard de Rendimiento Semanal -->
        <section class="card p-5 bg-slate-900 text-white overflow-hidden relative border-b-4 border-blue-500">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <p class="text-[10px] font-black uppercase tracking-widest opacity-50 italic text-blue-400 font-bold">Neto Histórico</p>
                    <h2 id="total-net-display" class="text-4xl font-black tracking-tighter">$0</h2>
                </div>
                <div class="text-right">
                    <p id="total-km-display" class="font-black text-xs text-blue-400 uppercase leading-none">0 KM</p>
                    <p id="total-hours-display" class="font-black text-[9px] text-emerald-400 uppercase mt-1">0.0 HRS</p>
                </div>
            </div>

            <!-- Gráfico de Rendimiento (Estilo Uber) -->
            <div class="mb-6">
                <div id="chart-bars" class="bar-container px-1"></div>
                <div id="chart-labels" class="flex justify-between px-1"></div>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white/5 rounded-2xl p-3 border border-white/10 text-center">
                    <p class="text-[8px] font-bold uppercase opacity-50 mb-1">Uber Neto</p>
                    <p id="uber-net-display" class="font-black text-sm">$0</p>
                </div>
                <div class="bg-white/5 rounded-2xl p-3 border border-white/10 text-center">
                    <p class="text-[8px] font-bold uppercase opacity-50 mb-1">Cabify Neto</p>
                    <p id="cabify-net-display" class="font-black text-sm">$0</p>
                </div>
            </div>
        </section>

        <!-- Formulario de Registro Multiapp -->
        <section class="card p-6 border-2 border-transparent focus-within:border-blue-500 transition-all">
            <h3 class="text-sm font-black text-slate-800 mb-6 flex items-center gap-2 uppercase italic">
                <i data-lucide="play-circle" class="text-emerald-500"></i> Registro de Turno
            </h3>
            
            <div class="space-y-6">
                <!-- Control Horario y KM del Odómetro -->
                <div class="bg-slate-50 p-4 rounded-2xl space-y-4 border border-slate-100 shadow-inner">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-[9px] font-black text-slate-400 uppercase">Hora Inicio (Auto)</label>
                            <input type="time" id="input-time-start" class="w-full p-2 bg-white rounded-lg font-bold text-blue-900 shadow-sm" readonly>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] font-black text-slate-400 uppercase">KM Inicial</label>
                            <input type="number" id="input-km-start" placeholder="Odómetro al salir" class="w-full p-2 bg-white rounded-lg font-bold shadow-sm">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1 opacity-60">
                            <label class="text-[9px] font-black text-slate-400 uppercase">Hora Fin (Cierre)</label>
                            <input type="time" id="input-time-end" class="w-full p-2 bg-white rounded-lg font-bold shadow-sm" readonly>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] font-black text-slate-400 uppercase">KM Final</label>
                            <input type="number" id="input-km-end" placeholder="Odómetro al llegar" class="w-full p-2 bg-white rounded-lg font-bold shadow-sm">
                        </div>
                    </div>
                </div>

                <!-- Bloque UBER -->
                <div class="border-l-4 border-black pl-4 space-y-3">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 bg-black rounded-full"></div>
                        <p class="text-[10px] font-black uppercase tracking-widest text-slate-700">Uber Driver</p>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="uber-bruto" placeholder="Bruto App $" class="w-full p-3 bg-slate-100 rounded-xl font-bold text-xs" oninput="autoCalc()">
                        <input type="number" id="uber-cash" placeholder="Efectivo $" class="w-full p-3 bg-orange-50 rounded-xl font-bold text-xs text-orange-700">
                    </div>
                    <input type="number" id="uber-km" placeholder="KM productivos (según app)" class="w-full p-3 bg-blue-50/50 rounded-xl font-bold text-[10px]">
                </div>

                <!-- Bloque CABIFY -->
                <div class="border-l-4 border-[#7343e2] pl-4 space-y-3">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 bg-[#7343e2] rounded-full"></div>
                        <p class="text-[10px] font-black uppercase tracking-widest text-slate-700">Cabify Driver</p>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="cabify-bruto" placeholder="Bruto App $" class="w-full p-3 bg-slate-100 rounded-xl font-bold text-xs" oninput="autoCalc()">
                        <input type="number" id="cabify-cash" placeholder="Efectivo $" class="w-full p-3 bg-orange-50 rounded-xl font-bold text-xs text-orange-700">
                    </div>
                    <input type="number" id="cabify-km" placeholder="KM productivos (según app)" class="w-full p-3 bg-purple-50/50 rounded-xl font-bold text-[10px]">
                </div>

                <!-- Gastos Fijos y SII -->
                <div class="grid grid-cols-3 gap-3">
                    <div class="col-span-1 space-y-1">
                        <label class="text-[8px] font-black text-slate-400 uppercase">SII (15.25%)</label>
                        <input type="number" id="input-tax" class="w-full p-3 rounded-xl font-bold input-readonly text-[10px]" readonly>
                    </div>
                    <div class="col-span-1 space-y-1">
                        <label class="text-[8px] font-black text-slate-400 uppercase">Petróleo</label>
                        <input type="number" id="input-fuel" placeholder="$0" class="w-full p-3 bg-slate-100 rounded-xl font-bold text-[10px]">
                    </div>
                    <div class="col-span-1 space-y-1">
                        <label class="text-[8px] font-black text-slate-400 uppercase">TAG</label>
                        <input type="number" id="input-tag" placeholder="$0" class="w-full p-3 bg-slate-100 rounded-xl font-bold text-[10px]">
                    </div>
                </div>

                <button id="btn-save" class="btn-primary w-full text-white font-black py-5 rounded-2xl flex justify-center items-center gap-3 active:scale-95 transition-all text-xs tracking-widest uppercase shadow-xl">
                    <i data-lucide="save"></i> Finalizar Jornada Mixta
                </button>
            </div>
        </section>

        <!-- Listado de Auditoría Histórica -->
        <section class="space-y-3 pb-10">
            <div class="flex justify-between items-center px-1">
                <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest italic">Registros en el Teléfono</h3>
                <button onclick="clearAll()" class="text-[10px] font-bold text-red-400 uppercase underline decoration-red-200">Reset</button>
            </div>
            <div id="history-container" class="space-y-3"></div>
        </section>

    </main>

    <!-- Modal de Resultado (Cierre de Caja) -->
    <div id="result-modal" class="fixed inset-0 bg-black/60 backdrop-blur-md hidden z-[100] items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] p-8 shadow-2xl space-y-6">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto -mt-2"></div>
            <div class="text-center">
                <h4 class="text-2xl font-black uppercase text-slate-800 tracking-tighter italic">Cierre Maestro</h4>
                <p id="modal-date" class="text-[10px] text-slate-400 font-black mt-2 uppercase tracking-widest"></p>
            </div>
            <div id="modal-summary" class="space-y-3 bg-slate-50 p-6 rounded-3xl border border-slate-100 font-bold text-xs"></div>
            
            <div id="bank-box" class="p-5 rounded-3xl border bg-blue-900 text-white text-center shadow-lg">
                <p class="text-[9px] font-black uppercase mb-2 opacity-60">Cuadre con el Banco</p>
                <div class="flex justify-between text-[10px] mb-2 opacity-80">
                    <span>Efectivo ya cobrado:</span>
                    <span id="modal-cash" class="font-black"></span>
                </div>
                <div class="border-t border-white/20 my-2"></div>
                <p class="text-xs font-bold italic mb-1 text-blue-200">Transferencia App pendiente:</p>
                <span id="modal-bank" class="text-2xl font-black tracking-tight"></span>
            </div>

            <button onclick="closeModal()" class="btn-primary w-full text-white font-black py-5 rounded-2xl uppercase tracking-widest active:scale-95 transition-all text-xs">
                Entendido, a descansar
            </button>
        </div>
    </div>

    <script>
        const MAX_LOGS = 200;
        let db = JSON.parse(localStorage.getItem('master_301_audit_vfinal')) || [];

        function safeRenderIcons(retries = 10) {
            if (window.lucide) { window.lucide.createIcons(); } 
            else if (retries > 0) { setTimeout(() => safeRenderIcons(retries - 1), 200); }
        }

        function getNowTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }

        function autoCalc() {
            const uBruto = parseFloat(document.getElementById('uber-bruto').value) || 0;
            const cBruto = parseFloat(document.getElementById('cabify-bruto').value) || 0;
            document.getElementById('input-tax').value = Math.round((uBruto + cBruto) * 0.1525);
        }

        function updateChart() {
            const chartBars = document.getElementById('chart-bars');
            const chartLabels = document.getElementById('chart-labels');
            if (!chartBars) return;

            const daysLabels = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
            const today = new Date();
            let dailyTotals = {};

            db.forEach(log => {
                if (!dailyTotals[log.fullDate]) dailyTotals[log.fullDate] = 0;
                dailyTotals[log.fullDate] += log.net;
            });

            let chartData = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date(); d.setDate(today.getDate() - i);
                const dateKey = d.toLocaleDateString('es-CL', { day: '2-digit', month: '2-digit' });
                chartData.push({ label: daysLabels[d.getDay()], value: dailyTotals[dateKey] || 0 });
            }

            const maxVal = Math.max(...chartData.map(d => d.value), 10000);
            chartBars.innerHTML = chartData.map(d => {
                const height = (d.value / maxVal) * 100;
                const barColor = d.value > 0 ? 'bg-blue-500' : 'bg-white/10';
                return `<div class="bar ${barColor}" style="height: ${Math.max(height, 5)}%"><div class="tooltip">$${Math.round(d.value).toLocaleString('es-CL')}</div></div>`;
            }).join('');
            chartLabels.innerHTML = chartData.map(d => `<div class="bar-label" style="width:100%">${d.label}</div>`).join('');
        }

        function processEntry() {
            const timeEnd = getNowTime();
            const startKm = parseFloat(document.getElementById('input-km-start').value);
            const endKm = parseFloat(document.getElementById('input-km-end').value);
            const uBruto = parseFloat(document.getElementById('uber-bruto').value) || 0;
            const uCash = parseFloat(document.getElementById('uber-cash').value) || 0;
            const uKm = parseFloat(document.getElementById('uber-km').value) || 0;
            const cBruto = parseFloat(document.getElementById('cabify-bruto').value) || 0;
            const cCash = parseFloat(document.getElementById('cabify-cash').value) || 0;
            const cKm = parseFloat(document.getElementById('cabify-km').value) || 0;
            const fuel = parseFloat(document.getElementById('input-fuel').value) || 0;
            const tag = parseFloat(document.getElementById('input-tag').value) || 0;

            if (isNaN(startKm) || isNaN(endKm) || (uBruto + cBruto) === 0) {
                alert("Ingresa KM y al menos una ganancia."); return;
            }

            const kmTotalSession = endKm - startKm;
            if (kmTotalSession <= 0) { alert("KM Término incorrecto."); return; }

            // Cálculos con retención 15.25%
            const netUber = uBruto - Math.round(uBruto * 0.1525);
            const netCabify = cBruto - Math.round(cBruto * 0.1525);
            const totalTax = Math.round((uBruto + cBruto) * 0.1525);
            const netReal = (netUber + netCabify) - fuel - tag;
            const expectedBank = (netUber + netCabify) - (uCash + cCash);

            const now = new Date();
            const entry = {
                id: Date.now(),
                fullDate: now.toLocaleDateString('es-CL', { day: '2-digit', month: '2-digit' }),
                dateStr: new Intl.DateTimeFormat('es-CL', { day: '2-digit', month: '2-digit' }).format(now),
                time: `${document.getElementById('input-time-start').value} - ${timeEnd}`,
                kmTotal: kmTotalSession,
                uNet: netUber,
                cNet: netCabify,
                bruto: uBruto + cBruto,
                cash: uCash + cCash,
                fuel: fuel,
                tag: tag,
                tax: totalTax,
                net: netReal,
                bank: expectedBank
            };

            db.unshift(entry);
            if (db.length > MAX_LOGS) db.pop();
            localStorage.setItem('master_301_audit_vfinal', JSON.stringify(db));

            // Reset y Preparar siguiente
            document.getElementById('input-km-start').value = endKm;
            document.getElementById('input-time-start').value = getNowTime();
            ['input-km-end', 'uber-bruto', 'uber-cash', 'uber-km', 'cabify-bruto', 'cabify-cash', 'cabify-km', 'input-fuel', 'input-tag', 'input-tax'].forEach(id => document.getElementById(id).value = "");

            refreshUI();
            showResult(entry);
        }

        function refreshUI() {
            if (db.length === 0) return;
            const totals = db.reduce((acc, log) => {
                acc.net += log.net;
                acc.uNet += log.uNet;
                acc.cNet += log.cNet;
                acc.km += log.kmTotal;
                acc.expenses += (log.fuel + log.tag + log.tax);
                return acc;
            }, { net: 0, uNet: 0, cNet: 0, km: 0, expenses: 0 });

            document.getElementById('total-net-display').innerText = `$${Math.round(totals.net).toLocaleString('es-CL')}`;
            document.getElementById('uber-net-display').innerText = `$${Math.round(totals.uNet).toLocaleString('es-CL')}`;
            document.getElementById('cabify-net-display').innerText = `$${Math.round(totals.cNet).toLocaleString('es-CL')}`;
            document.getElementById('total-km-display').innerText = `${totals.km.toLocaleString('es-CL')} KM`;
            
            updateChart();
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            if (db.length === 0) {
                container.innerHTML = '<p class="text-center text-[10px] text-slate-400 py-10 font-black uppercase italic tracking-widest">Sin datos registrados</p>';
                return;
            }
            container.innerHTML = db.map(log => `
                <div class="card p-4 border border-slate-100 mb-3 shadow-sm">
                    <div class="flex justify-between items-start mb-3">
                        <div class="bg-blue-900 text-white px-2 py-1 rounded-lg text-[9px] font-black">${log.dateStr}</div>
                        <div class="text-right">
                            <p class="text-sm font-black text-green-600">$${Math.round(log.net).toLocaleString('es-CL')}</p>
                            <p class="text-[7px] font-bold text-slate-400 uppercase tracking-tighter">Líquido Final Turno</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 text-[9px] border-t border-slate-50 pt-3">
                        <div>
                            <p class="font-bold text-slate-800 uppercase tracking-tighter">Distancia: ${log.kmTotal} KM</p>
                            <p class="text-slate-400 italic">${log.time}</p>
                        </div>
                        <div class="flex flex-col gap-1 text-[8px] font-bold">
                            <div class="flex justify-between"><span class="text-slate-500 uppercase">UBER:</span> <span class="text-black">$${Math.round(log.uNet).toLocaleString('es-CL')}</span></div>
                            <div class="flex justify-between"><span class="text-slate-500 uppercase">CABIFY:</span> <span class="text-[#7343e2]">$${Math.round(log.cNet).toLocaleString('es-CL')}</span></div>
                        </div>
                    </div>
                    ${(log.fuel > 0 || log.tag > 0) ? `
                    <div class="mt-3 flex gap-2">
                        ${log.fuel > 0 ? `<span class="bg-orange-50 text-orange-600 text-[7px] font-black px-2 py-0.5 rounded-full uppercase italic tracking-tighter">⛽ Petróleo: $${log.fuel.toLocaleString('es-CL')}</span>` : ''}
                        ${log.tag > 0 ? `<span class="bg-blue-50 text-blue-600 text-[7px] font-black px-2 py-0.5 rounded-full uppercase italic tracking-tighter">🛣️ TAG: $${log.tag.toLocaleString('es-CL')}</span>` : ''}
                    </div>` : ''}
                </div>`).join('');
            safeRenderIcons();
        }

        function showResult(log) {
            const modal = document.getElementById('result-modal');
            document.getElementById('modal-date').innerText = `${log.dateStr} | ${log.time}`;
            document.getElementById('modal-summary').innerHTML = `
                <div class="flex justify-between"><span>Recorrido total:</span> <span>${log.kmTotal} KM</span></div>
                <div class="flex justify-between text-red-500 font-bold"><span>Total Gastos (Inc. SII):</span> <span>-$${(log.fuel + log.tag + log.tax).toLocaleString('es-CL')}</span></div>
                <div class="border-t border-slate-200 mt-3 pt-3 flex justify-between items-center text-slate-900">
                    <span class="text-[9px] font-black uppercase opacity-40">Ganancia Real 301:</span>
                    <span class="text-xl font-black text-green-700">$${Math.round(log.net).toLocaleString('es-CL')}</span>
                </div>
            `;
            document.getElementById('modal-cash').innerText = `$${log.cash.toLocaleString('es-CL')}`;
            document.getElementById('modal-bank').innerText = `$${Math.round(log.bank).toLocaleString('es-CL')}`;
            modal.classList.add('active');
            safeRenderIcons();
        }

        function closeModal() { document.getElementById('result-modal').classList.remove('active'); }

        function clearAll() {
            if(confirm("¿Seguro que quieres borrar todo el historial?")) {
                db = []; localStorage.removeItem('master_301_audit_vfinal'); refreshUI(); location.reload();
            }
        }

        function initApp() {
            document.getElementById('display-date').innerText = new Intl.DateTimeFormat('es-CL', { day: 'numeric', month: 'short' }).format(new Date());
            document.getElementById('input-time-start').value = getNowTime();
            document.getElementById('btn-save').addEventListener('click', processEntry);
            refreshUI();
            safeRenderIcons();
        }

        if (document.readyState === 'complete') initApp();
        else window.addEventListener('load', initApp);
    </script>
</body>
</html>
